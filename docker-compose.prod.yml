services:
  app:
    image: sharad2905/task-manager-prisma:latest
    container_name: task-manager-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Have to Create .env File of EC2 Manually once
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: node build/src/index.js

  db:
    image: mysql:8
    container_name: task-manager-db
    restart: unless-stopped
    environment:
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
    ports:
      - "0.0.0.0:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DATABASE_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: task-manager-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  mysql_data: